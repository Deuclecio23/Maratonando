<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Avaliação</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <header class="global-header">
    <nav>
      <a href="index.html">➕ Nova Avaliação</a>
      <a href="historico.html">📔 Histórico</a>
      <a href="melhores.html">🏆 Pódio</a>
      <a href="ver-recomendacoes.html">💡 Recomendações</a>
    </nav>
  </header>

  <h1>✏️ Mudar a nota? Normal.</h1>

  <form id="editar-form">
    <label>Nome da Coisa: <input type="text" id="titulo" required /></label><br />

    <label>Tipo:
      <select id="categoria" required>
        <option value="Filmes">Filmes</option>
        <option value="Doramas">Doramas</option>
        <option value="Animes">Animes</option>
        <option value="Séries">Séries</option>
        <option value="Desenho animado">Desenho animado</option>
        <option value="Filme de desenho animado">Filme de desenho animado</option>
        <option value="Filme de Anime">Filme de Anime</option>
        <option value="Filme Coreano">Filme Coreano</option>
      </select>
    </label><br />

    <label>Link da Capa/Poster: <input type="url" id="imagem_url" required /></label><br />

    <div id="seletor-temporada-container" style="display: none; margin-bottom: 20px;">
      <label>Qual temporada quer editar?
        <select id="seletor_temporada"
          style="padding: 10px; border-radius: 8px; font-size: 1rem; width: 100%; border: 1.5px solid #ffafc5; background: rgba(255,255,255,0.9); margin-top: 5px;">
        </select>
      </label>
    </div>

    <fieldset>
      <legend><span class="nome-miri">Notas da Miri</span></legend>
      <label>História: <input type="number" id="miri_historia" min="0" max="10" step="0.1" /></label><br />
      <label>Personagens: <input type="number" id="miri_personagens" min="0" max="10" step="0.1" /></label><br />
      <div id="miri_atuacao_container">
        <label>Atuação: <input type="number" id="miri_atuacao" min="0" max="10" step="0.1" /></label><br />
      </div>
      <label>Visual / Estilo: <input type="number" id="miri_visual_estilo" min="0" max="10" step="0.1" /></label><br />
      <label>Emoção / Vibe: <input type="number" id="miri_emocao_vibe" min="0" max="10" step="0.1" /></label><br />
      <label>Nível de Surpresa / Originalidade: <input type="number" id="miri_surpresa" min="0" max="10" step="0.1" /></label><br />
      <label>Som / Música: <input type="number" id="miri_som_musica" min="0" max="10" step="0.1" /></label><br />
      <label>Ritmo: <input type="number" id="miri_ritmo" min="0" max="10" step="0.1" /></label><br />
      <label>Final: <input type="number" id="miri_final" min="0" max="10" step="0.1" /></label><br />

      <label class="pergunta-pessoal">Personagem que mais gostou?
        <input type="text" id="miri_personagem_favorito" />
      </label>
      <label class="pergunta-pessoal">Momento favorito?
        <input type="text" id="miri_momento_favorito" />
      </label>
      <label class="pergunta-pessoal">Frase/Fala que ficou na cabeça?
        <input type="text" id="miri_frase_marcante" />
      </label>
      <label class="pergunta-pessoal">Víamos de novo? (Sim, não, talvez...)
        <input type="text" id="miri_ver_de_novo" />
      </label>
      <label class="comentario-geral">Comentários Gerais (coisas aleatórias):
        <textarea id="miri_comentario_geral"></textarea>
      </label>
    </fieldset>

    <fieldset>
      <legend><span class="nome-deudeu">Notas do Deudeu</span></legend>
      <label>História: <input type="number" id="deudeu_historia" min="0" max="10" step="0.1" /></label><br />
      <label>Personagens: <input type="number" id="deudeu_personagens" min="0" max="10" step="0.1" /></label><br />
      <div id="deudeu_atuacao_container">
        <label>Atuação: <input type="number" id="deudeu_atuacao" min="0" max="10" step="0.1" /></label><br />
      </div>
      <label>Visual / Estilo: <input type="number" id="deudeu_visual_estilo" min="0" max="10" step="0.1" /></label><br />
      <label>Emoção / Vibe: <input type="number" id="deudeu_emocao_vibe" min="0" max="10" step="0.1" /></label><br />
      <label>Nível de Surpresa / Originalidade: <input type="number" id="deudeu_surpresa" min="0" max="10" step="0.1" /></label><br />
      <label>Som / Música: <input type="number" id="deudeu_som_musica" min="0" max="10" step="0.1" /></label><br />
      <label>Ritmo: <input type="number" id="deudeu_ritmo" min="0" max="10" step="0.1" /></label><br />
      <label>Final: <input type="number" id="deudeu_final" min="0" max="10" step="0.1" /></label><br />

      <label class="pergunta-pessoal">Personagem que mais gostou?
        <input type="text" id="deudeu_personagem_favorito" />
      </label>
      <label class="pergunta-pessoal">Momento favorito?
        <input type="text" id="deudeu_momento_favorito" />
      </label>
      <label class="pergunta-pessoal">Frase/Fala que ficou na cabeça?
        <input type="text" id="deudeu_frase_marcante" />
      </label>
      <label class="pergunta-pessoal">Víamos de novo? (Sim, não, talvez...)
        <input type="text" id="deudeu_ver_de_novo" />
      </label>
      <label class="comentario-geral">Comentários Gerais (coisas aleatórias):
        <textarea id="deudeu_comentario_geral"></textarea>
      </label>
    </fieldset>

    <button type="submit">Pronto, mudei</button>
    <a href="historico.html" class="btn-voltar">Voltar</a>
  </form>

  <script type="module" src="editar.js"></script>
</body>

</html>
